<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>VOID RUNNER</title>
<style>
  :root{
    --bg:#06070d;
    --panel:#0d0f1a;
    --neon:#5ef2ff;
    --neon2:#ff3df0;
    --warn:#ffd23f;
    --text:#e8ecff;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; height:100%; background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    font-family:'Courier New', monospace;
    color:var(--text);
    overflow:hidden;
  }
  #wrap{ position:relative; }
  canvas{
    background:radial-gradient(ellipse at 50% 30%, #0c1130 0%, #050610 70%);
    display:block;
    border:1px solid #1c2240;
    box-shadow: 0 0 40px rgba(94,242,255,0.15), inset 0 0 60px rgba(0,0,0,0.6);
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:14px 18px;
    pointer-events:none;
    letter-spacing:2px;
    font-size:13px;
    text-transform:uppercase;
  }
  #hud span{ color:var(--neon); text-shadow:0 0 8px rgba(94,242,255,0.6); }
  #lives{ color:var(--neon2); text-shadow:0 0 8px rgba(255,61,240,0.6); }
  #overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(5,6,16,0.88);
    text-align:center;
    gap:18px;
  }
  #overlay h1{
    margin:0;
    font-size:38px;
    letter-spacing:8px;
    color:var(--neon);
    text-shadow:0 0 18px rgba(94,242,255,0.7), 0 0 40px rgba(94,242,255,0.3);
  }
  #overlay p{
    margin:0;
    font-size:13px;
    letter-spacing:2px;
    color:#9aa3c7;
    line-height:1.8;
  }
  #overlay .accent{ color:var(--warn); }
  button{
    font-family:inherit;
    background:transparent;
    color:var(--neon);
    border:1px solid var(--neon);
    padding:10px 28px;
    letter-spacing:3px;
    font-size:13px;
    cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 0 12px rgba(94,242,255,0.25);
    transition:all .15s;
  }
  button:hover{
    background:rgba(94,242,255,0.12);
    box-shadow:0 0 20px rgba(94,242,255,0.5);
  }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="hud">
    <span id="score">SCORE 0</span>
    <span id="wave">WAVE 1</span>
    <span id="lives">LIFE ●●●</span>
  </div>
  <div id="overlay">
    <h1>VOID RUNNER</h1>
    <p>← → / A D で移動 ・ SPACE で発射<br>スマホは画面をドラッグで移動、自動発射<br><span class="accent">敵を倒してスコアを稼げ</span></p>
    <button id="startBtn">START</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const scoreEl = document.getElementById('score');
const waveEl = document.getElementById('wave');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');

let keys = {};
window.addEventListener('keydown', e=>{
  keys[e.key]=true;
  if(e.key===' ') e.preventDefault();
});
window.addEventListener('keyup', e=> keys[e.key]=false);

// touch control
let touchX = null;
canvas.addEventListener('touchstart', e=>{
  touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
}, {passive:true});
canvas.addEventListener('touchmove', e=>{
  touchX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
}, {passive:true});
canvas.addEventListener('touchend', ()=> touchX = null);

let state = 'menu'; // menu, playing, gameover
let score = 0;
let wave = 1;
let lives = 3;
let frame = 0;

const player = {
  x: W/2, y: H-70, w: 30, h: 30, speed: 5,
  cooldown: 0
};

let bullets = [];
let enemyBullets = [];
let enemies = [];
let particles = [];
let stars = [];

for(let i=0;i<80;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, s:Math.random()*1.8+0.3, sp:Math.random()*1.5+0.5});
}

function spawnWave(n){
  enemies = [];
  const rows = Math.min(2+Math.floor(n/2), 5);
  const cols = Math.min(4+Math.floor(n/3), 8);
  const startX = (W - (cols-1)*48)/2;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({
        x: startX + c*48,
        y: 60 + r*44,
        w: 26, h: 22,
        baseX: startX + c*48,
        alive: true,
        hp: 1 + (r===0 && n>3 ? 1:0),
        fireChance: 0.0015 + n*0.0003,
        phase: Math.random()*Math.PI*2
      });
    }
  }
}

function resetGame(){
  score = 0; wave = 1; lives = 3; bullets=[]; enemyBullets=[]; particles=[];
  player.x = W/2; player.cooldown=0;
  spawnWave(wave);
  updateHud();
}

function updateHud(){
  scoreEl.textContent = 'SCORE ' + score;
  waveEl.textContent = 'WAVE ' + wave;
  livesEl.textContent = 'LIFE ' + '●'.repeat(Math.max(lives,0)) + '○'.repeat(Math.max(3-lives,0));
}

function addParticles(x,y,color,count=10){
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx:(Math.random()-0.5)*5,
      vy:(Math.random()-0.5)*5,
      life: 25+Math.random()*15,
      color
    });
  }
}

function rectsOverlap(a,b){
  return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
}

function startGame(){
  resetGame();
  state = 'playing';
  overlay.classList.add('hidden');
}

startBtn.addEventListener('click', startGame);

function endGame(){
  state = 'gameover';
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1 style="color:var(--neon2); text-shadow:0 0 18px rgba(255,61,240,0.7)">GAME OVER</h1>
    <p>SCORE <span class="accent">${score}</span> ・ WAVE ${wave} まで到達</p>
    <button id="retryBtn">RETRY</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', startGame);
}

function update(){
  frame++;

  // stars
  stars.forEach(s=>{
    s.y += s.sp;
    if(s.y>H){ s.y=0; s.x=Math.random()*W; }
  });

  if(state!=='playing') return;

  // player movement
  if(touchX!==null){
    player.x += (touchX - player.x) * 0.2;
  } else {
    if(keys['ArrowLeft']||keys['a']) player.x -= player.speed;
    if(keys['ArrowRight']||keys['d']) player.x += player.speed;
  }
  player.x = Math.max(player.w/2, Math.min(W-player.w/2, player.x));

  // fire
  player.cooldown--;
  const autoFire = touchX !== null;
  if((keys[' ']||autoFire) && player.cooldown<=0){
    bullets.push({x:player.x, y:player.y-20, w:4, h:12, vy:-9});
    player.cooldown = 10;
  }

  // bullets
  bullets.forEach(b=> b.y += b.vy);
  bullets = bullets.filter(b=> b.y > -20);

  enemyBullets.forEach(b=> b.y += b.vy);
  enemyBullets = enemyBullets.filter(b=> b.y < H+20);

  // enemies movement (sine sway + slow descent)
  let aliveCount = 0;
  enemies.forEach(en=>{
    if(!en.alive) return;
    aliveCount++;
    en.phase += 0.04;
    en.x = en.baseX + Math.sin(en.phase)*26;
    en.baseY = en.baseY || en.y;
    en.y += 0.12;
    if(Math.random() < en.fireChance){
      enemyBullets.push({x:en.x, y:en.y+15, w:4, h:10, vy:4.5});
    }
  });

  // collisions: bullets -> enemies
  bullets.forEach(b=>{
    enemies.forEach(en=>{
      if(!en.alive) return;
      const bb = {x:b.x-2, y:b.y-6, w:4, h:12};
      const eb = {x:en.x-13, y:en.y-11, w:26, h:22};
      if(rectsOverlap(bb,eb)){
        en.hp--;
        b.y = -999;
        if(en.hp<=0){
          en.alive = false;
          score += 100;
          addParticles(en.x, en.y, '#5ef2ff', 14);
        }
      }
    });
  });
  bullets = bullets.filter(b=> b.y > -100);

  // collisions: enemyBullets -> player
  const pb = {x:player.x-13, y:player.y-13, w:26, h:26};
  enemyBullets.forEach(b=>{
    const bb={x:b.x-2, y:b.y-5, w:4,h:10};
    if(rectsOverlap(bb,pb)){
      b.y = H+999;
      hitPlayer();
    }
  });

  // collisions: enemies -> player (reached bottom)
  enemies.forEach(en=>{
    if(!en.alive) return;
    if(en.y > H-50){
      en.alive = false;
      hitPlayer();
      addParticles(en.x, en.y, '#ff3df0', 14);
    }
  });

  // particles
  particles.forEach(p=>{
    p.x += p.vx; p.y += p.vy; p.life--;
  });
  particles = particles.filter(p=> p.life>0);

  if(aliveCount===0){
    wave++;
    spawnWave(wave);
  }

  updateHud();
}

function hitPlayer(){
  lives--;
  addParticles(player.x, player.y, '#ffd23f', 18);
  updateHud();
  if(lives<=0){
    endGame();
  }
}

function drawShip(x,y,color,glow){
  ctx.save();
  ctx.translate(x,y);
  ctx.shadowColor = glow;
  ctx.shadowBlur = 14;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(0,-15);
  ctx.lineTo(13,14);
  ctx.lineTo(0,8);
  ctx.lineTo(-13,14);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawEnemy(en){
  ctx.save();
  ctx.translate(en.x, en.y);
  ctx.shadowColor = en.hp>1 ? '#ffd23f' : '#ff3df0';
  ctx.shadowBlur = 10;
  ctx.fillStyle = en.hp>1 ? '#ffd23f' : '#ff3df0';
  ctx.beginPath();
  ctx.moveTo(0,11);
  ctx.lineTo(13,-9);
  ctx.lineTo(0,-3);
  ctx.lineTo(-13,-9);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // stars
  ctx.fillStyle='#cdd6ff';
  stars.forEach(s=>{
    ctx.globalAlpha = 0.5;
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });
  ctx.globalAlpha = 1;

  if(state==='playing'){
    // player bullets
    ctx.fillStyle = '#5ef2ff';
    ctx.shadowColor = '#5ef2ff';
    ctx.shadowBlur = 8;
    bullets.forEach(b=> ctx.fillRect(b.x-2, b.y-6, 4, 12));
    ctx.shadowBlur = 0;

    // enemy bullets
    ctx.fillStyle = '#ff3df0';
    ctx.shadowColor = '#ff3df0';
    ctx.shadowBlur = 8;
    enemyBullets.forEach(b=> ctx.fillRect(b.x-2, b.y-5, 4, 10));
    ctx.shadowBlur = 0;

    // enemies
    enemies.forEach(en=>{ if(en.alive) drawEnemy(en); });

    // player
    drawShip(player.x, player.y, '#5ef2ff', '#5ef2ff');

    // particles
    particles.forEach(p=>{
      ctx.globalAlpha = Math.max(p.life/30,0);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x, p.y, 3, 3);
    });
    ctx.globalAlpha = 1;
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
