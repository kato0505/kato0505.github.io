<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VOID RUNNER</title>
<style>
  :root{
    --bg:#06070d; --neon:#5ef2ff; --neon2:#ff3df0; --warn:#ffd23f; --text:#e8ecff;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
    font-family:'Courier New', monospace;
    color:var(--text);
    overflow:hidden;
    touch-action:none;
  }
  #wrap{
    position:relative;
    width:100vmin;
    height:100vmin;
    max-width:540px;
    max-height:540px;
  }
  canvas{
    width:100%; height:100%;
    background:radial-gradient(ellipse at 50% 30%, #0c1130 0%, #050610 70%);
    display:block;
    border:1px solid #1c2240;
    box-shadow:0 0 40px rgba(94,242,255,0.15), inset 0 0 60px rgba(0,0,0,0.6);
  }
  #hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between;
    padding:10px 14px;
    pointer-events:none;
    letter-spacing:1px;
    font-size:clamp(10px, 2.5vmin, 14px);
    text-transform:uppercase;
  }
  #hud span{ color:var(--neon); text-shadow:0 0 8px rgba(94,242,255,0.6); }
  #lives{ color:var(--neon2) !important; text-shadow:0 0 8px rgba(255,61,240,0.6) !important; }
  #overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(5,6,16,0.88);
    text-align:center;
    gap:14px;
    padding:20px;
  }
  #overlay h1{
    margin:0;
    font-size:clamp(22px, 7vmin, 40px);
    letter-spacing:6px;
    color:var(--neon);
    text-shadow:0 0 18px rgba(94,242,255,0.7), 0 0 40px rgba(94,242,255,0.3);
  }
  #overlay p{
    margin:0;
    font-size:clamp(10px, 2.5vmin, 13px);
    letter-spacing:1px;
    color:#9aa3c7;
    line-height:1.8;
  }
  .accent{ color:var(--warn); }
  button{
    font-family:inherit;
    background:transparent;
    color:var(--neon);
    border:1px solid var(--neon);
    padding:10px 28px;
    letter-spacing:3px;
    font-size:clamp(11px, 2.5vmin, 14px);
    cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 0 12px rgba(94,242,255,0.25);
    transition:all .15s;
  }
  button:active{ background:rgba(94,242,255,0.2); }
  #joypad{
    position:absolute; bottom:0; left:0; right:0;
    height:22%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 6%;
    pointer-events:none;
  }
  .btn-area{
    pointer-events:all;
    width:18vmin; height:18vmin;
    max-width:72px; max-height:72px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:clamp(18px, 5vmin, 28px);
    user-select:none;
    -webkit-user-select:none;
    cursor:pointer;
  }
  #btnL{ background:rgba(94,242,255,0.12); border:1px solid rgba(94,242,255,0.4); color:var(--neon); }
  #btnR{ background:rgba(94,242,255,0.12); border:1px solid rgba(94,242,255,0.4); color:var(--neon); }
  #btnFire{ background:rgba(255,61,240,0.15); border:1px solid rgba(255,61,240,0.5); color:var(--neon2); font-size:clamp(10px,2.5vmin,13px); letter-spacing:1px; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud">
    <span id="score">SCORE 0</span>
    <span id="wave">WAVE 1</span>
    <span id="lives" class="lives">LIFE ●●●</span>
  </div>
  <div id="overlay">
    <h1>VOID RUNNER</h1>
    <p>← → で移動 ・ SPACE で発射<br>スマホ: 下のボタンで操作<br><span class="accent">敵を倒してスコアを稼げ</span></p>
    <button id="startBtn">START</button>
  </div>
  <div id="joypad" class="hidden">
    <div class="btn-area" id="btnL">◀</div>
    <div class="btn-area" id="btnFire">FIRE</div>
    <div class="btn-area" id="btnR">▶</div>
  </div>
</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');

function resizeCanvas(){
  const size = Math.min(wrap.offsetWidth, wrap.offsetHeight);
  canvas.width = size;
  canvas.height = size;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = ()=> canvas.width;
const H = ()=> canvas.height;

// ─── AUDIO ──────────────────────────────────────────────────
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playShoot(){
  const ac = getAudio();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = 'square';
  o.frequency.setValueAtTime(880, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(220, ac.currentTime+0.08);
  g.gain.setValueAtTime(0.18, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.08);
  o.start(); o.stop(ac.currentTime+0.08);
}

function playExplosion(big=false){
  const ac = getAudio();
  const buf = ac.createBuffer(1, ac.sampleRate*0.3, ac.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const src = ac.createBufferSource();
  const g = ac.createGain();
  const filter = ac.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = big ? 180 : 400;
  filter.Q.value = 1;
  src.buffer = buf;
  src.connect(filter); filter.connect(g); g.connect(ac.destination);
  g.gain.setValueAtTime(big?0.5:0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.3);
  src.start();
}

function playHit(){
  const ac = getAudio();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.connect(g); g.connect(ac.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(110, ac.currentTime);
  o.frequency.exponentialRampToValueAtTime(40, ac.currentTime+0.15);
  g.gain.setValueAtTime(0.3, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.15);
  o.start(); o.stop(ac.currentTime+0.15);
}

function playWaveClear(){
  const ac = getAudio();
  [523,659,784,1046].forEach((freq,i)=>{
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, ac.currentTime+i*0.1);
    g.gain.linearRampToValueAtTime(0.2, ac.currentTime+i*0.1+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+i*0.1+0.3);
    o.start(ac.currentTime+i*0.1);
    o.stop(ac.currentTime+i*0.1+0.3);
  });
}

// BGM
let bgmNodes = [];
let bgmPlaying = false;
function startBGM(){
  if(bgmPlaying) return;
  bgmPlaying = true;
  const ac = getAudio();
  // drone bass
  const drone = ac.createOscillator();
  const droneG = ac.createGain();
  drone.type='sawtooth'; drone.frequency.value=55;
  const filter = ac.createBiquadFilter();
  filter.type='lowpass'; filter.frequency.value=200;
  drone.connect(filter); filter.connect(droneG); droneG.connect(ac.destination);
  droneG.gain.value=0.06;
  drone.start();
  bgmNodes.push(drone, droneG);

  // arpeggio
  const notes=[220,261,329,392,440,392,329,261];
  let step=0;
  function arp(){
    if(!bgmPlaying) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type='triangle';
    o.frequency.value = notes[step % notes.length];
    o.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.06, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime+0.18);
    o.start(); o.stop(ac.currentTime+0.18);
    step++;
    bgmNodes.push(o,g);
    setTimeout(arp, 180);
  }
  arp();

  // hi-hat rhythm
  function hihat(){
    if(!bgmPlaying) return;
    const buf = ac.createBuffer(1, ac.sampleRate*0.04, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    const src = ac.createBufferSource();
    const g = ac.createGain();
    const hf = ac.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=6000;
    src.buffer=buf; src.connect(hf); hf.connect(g); g.connect(ac.destination);
    g.gain.value=0.04; src.start();
    setTimeout(hihat, 240);
  }
  hihat();
}

function stopBGM(){
  bgmPlaying=false;
  bgmNodes.forEach(n=>{ try{ n.stop?.(); n.disconnect?.(); }catch(e){} });
  bgmNodes=[];
}

// ─── INPUT ──────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.key===' ') e.preventDefault(); });
window.addEventListener('keyup', e=> keys[e.key]=false);

const isMobile = ('ontouchstart' in window);
const joypad = document.getElementById('joypad');
const btnL = document.getElementById('btnL');
const btnR = document.getElementById('btnR');
const btnFire = document.getElementById('btnFire');
const padState = {left:false, right:false, fire:false};

function addHoldEvents(el, key){
  el.addEventListener('touchstart', e=>{ e.preventDefault(); padState[key]=true; }, {passive:false});
  el.addEventListener('touchend', e=>{ e.preventDefault(); padState[key]=false; }, {passive:false});
  el.addEventListener('touchcancel', ()=> padState[key]=false);
}
addHoldEvents(btnL,'left');
addHoldEvents(btnR,'right');
addHoldEvents(btnFire,'fire');

// ─── GAME STATE ─────────────────────────────────────────────
const scoreEl=document.getElementById('score');
const waveEl=document.getElementById('wave');
const livesEl=document.getElementById('lives');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');

let state='menu';
let score=0, wave=1, lives=3, frame=0;

const player={x:0,y:0,w:0,h:0,speed:0,cooldown:0};

let bullets=[], enemyBullets=[], enemies=[], particles=[], rings=[], stars=[];

function initStars(){
  stars=[];
  for(let i=0;i<90;i++)
    stars.push({x:Math.random()*W(), y:Math.random()*H(), s:Math.random()*1.8+0.3, sp:Math.random()*1.5+0.5});
}

function initPlayer(){
  player.x=W()/2; player.y=H()-H()*0.1;
  player.w=W()*0.06; player.h=W()*0.06;
  player.speed=W()*0.01; player.cooldown=0;
}

function spawnWave(n){
  enemies=[];
  const rows=Math.min(2+Math.floor(n/2),5);
  const cols=Math.min(4+Math.floor(n/3),8);
  const spacing=W()/(cols+1);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({
        x:spacing*(c+1), y:H()*0.08+r*H()*0.07,
        baseX:spacing*(c+1),
        alive:true,
        hp:1+(r===0&&n>3?1:0),
        fireChance:0.0012+n*0.0003,
        phase:Math.random()*Math.PI*2
      });
    }
  }
}

function resetGame(){
  score=0; wave=1; lives=3; bullets=[]; enemyBullets=[]; particles=[]; rings=[];
  initStars(); initPlayer(); spawnWave(wave); updateHud();
}

function updateHud(){
  scoreEl.textContent='SCORE '+score;
  waveEl.textContent='WAVE '+wave;
  livesEl.textContent='LIFE '+'●'.repeat(Math.max(lives,0))+'○'.repeat(Math.max(3-lives,0));
}

function addParticles(x,y,color,count=10){
  for(let i=0;i<count;i++){
    const spd=(Math.random()*3+1)*(W()/480);
    const ang=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
      life:25+Math.random()*15, color});
  }
}

function addRing(x,y,color,big=false){
  rings.push({x,y,r:0,maxR:big?W()*0.12:W()*0.07,color,life:18,maxLife:18,big});
}

function rectsOverlap(a,b){
  return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
}

function startGame(){
  getAudio(); // unlock audio
  resetGame();
  state='playing';
  overlay.classList.add('hidden');
  if(isMobile) joypad.classList.remove('hidden');
  startBGM();
}

startBtn.addEventListener('click', startGame);
startBtn.addEventListener('touchend', e=>{ e.preventDefault(); startGame(); });

function endGame(){
  state='gameover';
  stopBGM();
  overlay.classList.remove('hidden');
  if(isMobile) joypad.classList.add('hidden');
  overlay.innerHTML=`
    <h1 style="color:var(--neon2);text-shadow:0 0 18px rgba(255,61,240,0.7)">GAME OVER</h1>
    <p>SCORE <span class="accent">${score}</span> ・ WAVE ${wave} まで到達</p>
    <button id="retryBtn">RETRY</button>
  `;
  const rb=document.getElementById('retryBtn');
  rb.addEventListener('click', startGame);
  rb.addEventListener('touchend', e=>{ e.preventDefault(); startGame(); });
}

// ─── UPDATE ─────────────────────────────────────────────────
function update(){
  frame++;
  const w=W(), h=H();
  const bw=w*0.008, bh=h*0.018;
  const ev=w*0.028, eh=h*0.024;

  // stars
  stars.forEach(s=>{ s.y+=s.sp*(h/480); if(s.y>h){ s.y=0; s.x=Math.random()*w; } });

  if(state!=='playing') return;

  // resize dependent values
  player.w=w*0.06; player.h=w*0.06;
  player.speed=w*0.012;

  // player move
  const goL = keys['ArrowLeft']||keys['a']||padState.left;
  const goR = keys['ArrowRight']||keys['d']||padState.right;
  if(goL) player.x -= player.speed;
  if(goR) player.x += player.speed;
  player.x=Math.max(player.w/2, Math.min(w-player.w/2, player.x));

  // fire
  player.cooldown--;
  const doFire = keys[' ']||padState.fire;
  if(doFire && player.cooldown<=0){
    bullets.push({x:player.x, y:player.y-player.h*0.6, vx:0, vy:-h*0.018});
    player.cooldown=10;
    playShoot();
  }

  // bullets
  bullets.forEach(b=>{ b.y+=b.vy; });
  bullets=bullets.filter(b=>b.y>-20);
  enemyBullets.forEach(b=>{ b.y+=b.vy; });
  enemyBullets=enemyBullets.filter(b=>b.y<h+20);

  // enemies
  let aliveCount=0;
  enemies.forEach(en=>{
    if(!en.alive) return;
    aliveCount++;
    en.phase+=0.04;
    en.x=en.baseX+Math.sin(en.phase)*w*0.055;
    en.y+=h*0.0002;
    if(Math.random()<en.fireChance)
      enemyBullets.push({x:en.x, y:en.y+eh, vy:h*0.009});
    if(en.y>h-h*0.08){ en.alive=false; hitPlayer(); addParticles(en.x,en.y,'#ff3df0',14); addRing(en.x,en.y,'#ff3df0'); }
  });

  // collisions: bullets -> enemies
  bullets.forEach(b=>{
    enemies.forEach(en=>{
      if(!en.alive) return;
      const bb={x:b.x-bw/2,y:b.y-bh/2,w:bw,h:bh};
      const eb={x:en.x-ev,y:en.y-eh,w:ev*2,h:eh*2};
      if(rectsOverlap(bb,eb)){
        en.hp--;
        b.vy=0; b.y=-999;
        if(en.hp<=0){ en.alive=false; score+=100; addParticles(en.x,en.y,'#5ef2ff',14); addRing(en.x,en.y,'#5ef2ff'); playExplosion(); }
      }
    });
  });
  bullets=bullets.filter(b=>b.y>-100);

  // collisions: enemyBullets -> player
  const pb={x:player.x-player.w*0.4,y:player.y-player.h*0.4,w:player.w*0.8,h:player.h*0.8};
  enemyBullets.forEach(b=>{
    const bb={x:b.x-bw/2,y:b.y-bh/2,w:bw,h:bh};
    if(rectsOverlap(bb,pb)){ b.y=h+999; hitPlayer(); }
  });

  // particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life--; });
  particles=particles.filter(p=>p.life>0);

  // rings
  rings.forEach(r=>{ r.r += r.maxR/r.maxLife * 2.2; r.life--; });
  rings=rings.filter(r=>r.life>0);

  if(aliveCount===0){ wave++; spawnWave(wave); playWaveClear(); }
  updateHud();
}

function hitPlayer(){
  lives--;
  addParticles(player.x,player.y,'#ffd23f',18); addRing(player.x,player.y,'#ffd23f',true);
  playHit();
  updateHud();
  if(lives<=0) endGame();
}

// ─── DRAW ───────────────────────────────────────────────────
function drawShip(x,y,sz,color,glow){
  ctx.save();
  ctx.translate(x,y);
  ctx.shadowColor=glow; ctx.shadowBlur=14;
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.moveTo(0,-sz);
  ctx.lineTo(sz*0.9,sz*0.9);
  ctx.lineTo(0,sz*0.4);
  ctx.lineTo(-sz*0.9,sz*0.9);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawEnemy(en){
  const w=W(), h=H();
  const sz=w*0.026;
  ctx.save();
  ctx.translate(en.x,en.y);
  const col=en.hp>1?'#ffd23f':'#ff3df0';
  ctx.shadowColor=col; ctx.shadowBlur=10;
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(0,sz*1.1);
  ctx.lineTo(sz*1.1,-sz*0.8);
  ctx.lineTo(0,-sz*0.2);
  ctx.lineTo(-sz*1.1,-sz*0.8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function draw(){
  const w=W(), h=H();
  ctx.clearRect(0,0,w,h);

  // stars
  ctx.fillStyle='#cdd6ff';
  stars.forEach(s=>{
    ctx.globalAlpha=0.5;
    ctx.fillRect(s.x,s.y,s.s*(w/480),s.s*(w/480));
  });
  ctx.globalAlpha=1;

  if(state!=='playing') return;

  const bw=w*0.008, bh=h*0.018;

  // player bullets
  ctx.fillStyle='#5ef2ff';
  ctx.shadowColor='#5ef2ff'; ctx.shadowBlur=8;
  bullets.forEach(b=> ctx.fillRect(b.x-bw/2,b.y-bh/2,bw,bh));
  ctx.shadowBlur=0;

  // enemy bullets
  ctx.fillStyle='#ff3df0';
  ctx.shadowColor='#ff3df0'; ctx.shadowBlur=8;
  enemyBullets.forEach(b=> ctx.fillRect(b.x-bw/2,b.y-bh/2,bw,bh));
  ctx.shadowBlur=0;

  // enemies
  enemies.forEach(en=>{ if(en.alive) drawEnemy(en); });

  // player
  drawShip(player.x,player.y,player.w*0.55,'#5ef2ff','#5ef2ff');

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(p.life/30,0);
    ctx.fillStyle=p.color;
    const ps=w*0.006;
    ctx.fillRect(p.x,p.y,ps,ps);
  });
  ctx.globalAlpha=1;

  // explosion rings
  rings.forEach(r=>{
    const alpha = (r.life/r.maxLife)*0.85;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = r.color;
    ctx.shadowColor = r.color;
    ctx.shadowBlur = r.big ? 20 : 12;
    ctx.lineWidth = r.big ? w*0.006 : w*0.004;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI*2);
    ctx.stroke();
    if(r.r > w*0.02){
      ctx.globalAlpha = alpha*0.4;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r*0.6, 0, Math.PI*2);
      ctx.stroke();
    }
    ctx.shadowBlur=0;
  });
  ctx.globalAlpha=1;
}


function loop(){ update(); draw(); requestAnimationFrame(loop); }
initStars();
loop();
</script>
</body>
</html>
